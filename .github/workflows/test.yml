name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt -q
      - name: Check Python syntax
        run: |
          python -m py_compile config.py web_server.py main.py
          python -m py_compile workflow/pipeline.py workflow/state.py
          python -m py_compile agents/base.py agents/schemas.py agents/portfolio_manager.py
          python -m py_compile agents/analysts/technical.py
          python -m py_compile agents/researchers/bull.py agents/researchers/bear.py agents/researchers/manager.py
          python -m py_compile agents/trader/trader.py
          python -m py_compile agents/risk/aggressive.py agents/risk/conservative.py agents/risk/neutral.py
          python -m py_compile data/market.py data/realtime.py data/news.py data/fundamentals.py data/signals.py data/signals_utils.py data/filings.py data/cache.py data/search.py
          python -m py_compile llm/client.py llm/prompts.py
          python -m py_compile memory/database.py memory/logger.py
          echo "✅ All files compiled successfully"
