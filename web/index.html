<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trading Agent</title>
  <link rel="stylesheet" href="./styles.css?v=7" />
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <div class="nav-inner">
    <div class="nav-brand">
      <svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 18h16M5 15l4-4 4 3 6-8"/><path d="M16 6h3v3"/></svg>
      <div>
        <span class="nav-title">Trading Agent</span>
        <span class="nav-sub">A 股多智能体分析</span>
      </div>
    </div>
    <div class="nav-status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">就绪</span>
      <span class="nav-sep"></span>
      <span id="clock">--:--</span>
    </div>
  </div>
</nav>

<main class="main">

  <!-- Sidebar -->
  <aside class="side" id="side">

    <div class="card">
      <form id="form" class="search-form">
        <label class="search-label">股票代码 / 名称</label>
        <div class="search-wrap">
          <input id="ticker" class="search-input" value="600036" placeholder="例 600036 或 招商银行" autocomplete="off" />
          <button id="clearBtn" class="search-clear" type="button">&times;</button>
          <div id="suggestions" class="suggestions hidden"></div>
        </div>
        <button id="submitBtn" class="btn-primary" type="submit">
          <svg width="14" height="14" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
          开始分析
        </button>
      </form>
      <div id="recent" class="recent hidden">
        <div class="recent-label">最近</div>
        <div id="recentList" class="recent-list"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <h2>运行状态</h2>
        <span id="badge" class="badge idle">待命</span>
      </div>
      <ul id="stages" class="stages">
        <li data-stage="collect"><span></span>采集数据</li>
        <li data-stage="analysts"><span></span>分析师团队</li>
        <li data-stage="debate"><span></span>研究员辩论</li>
        <li data-stage="trader"><span></span>交易方案</li>
        <li data-stage="risk"><span></span>风险评估</li>
        <li data-stage="decision"><span></span>最终决策</li>
      </ul>
    </div>

    <div class="card">
      <div class="card-head">
        <h2>历史记录</h2>
        <button id="historyBtn" class="btn-text" type="button">展开</button>
      </div>
      <div id="historyPanel" class="history hidden"></div>
    </div>

    <div class="card">
      <div class="card-head">
        <h2>LLM 设置</h2>
        <button id="settingsBtn" class="btn-text" type="button">展开</button>
      </div>
      <div id="settingsPanel" class="settings hidden">
        <div class="settings-field">
          <label>API 地址</label>
          <input id="sBaseUrl" class="search-input" placeholder="https://api.deepseek.com/v1" />
        </div>
        <div class="settings-field">
          <label>模型名称</label>
          <input id="sModel" class="search-input" placeholder="deepseek-chat" />
        </div>
        <div class="settings-field">
          <label>快速模型</label>
          <input id="sQuick" class="search-input" placeholder="deepseek-chat" />
        </div>
        <div class="settings-field">
          <label>API Key</label>
          <input id="sApiKey" class="search-input" type="password" placeholder="sk-..." />
        </div>
        <button id="saveSettings" class="btn-primary" type="button" style="margin-top:8px;font-size:12px;height:32px">保存并重启</button>
        <div id="settingsStatus" class="muted" style="margin-top:6px"></div>
      </div>
    </div>

  </aside>

  <!-- Workspace -->
  <section class="workspace">

    <!-- Loading overlay -->
    <div id="loader" class="loader hidden">
      <div class="loader-dots"><span></span><span></span><span></span></div>
      <div class="loader-text" id="loaderText">分析中，预计 2~3 分钟...</div>
      <div class="loader-elapsed" id="elapsed">00:00</div>
    </div>

    <!-- Result hero -->
    <div id="hero" class="result-hero">
      <div class="hero-top">
        <div>
          <div class="hero-eyeline">最终评级</div>
          <div class="hero-rating-wrap">
            <div id="rating" class="hero-rating">等待分析</div>
            <div id="ratingSkel" class="skel skel-rating hidden"></div>
          </div>
          <p id="summary" class="hero-summary">输入股票代码开始多智能体深度分析。</p>
          <div id="summarySkel" class="skel skel-summary hidden">
            <div class="skel-line w-100"></div>
            <div class="skel-line w-75"></div>
            <div class="skel-line w-50"></div>
          </div>
        </div>
        <div id="tickerMeta" class="hero-meta">--</div>
      </div>

      <div id="metricsArea" class="metrics">
        <div class="metric"><span>当前价</span><strong id="currentPrice">--</strong></div>
        <div class="metric"><span>涨跌幅</span><strong id="changePct">--</strong></div>
        <div class="metric"><span>目标价</span><strong id="targetPrice">--</strong></div>
        <div class="metric"><span>持有周期</span><strong id="horizon">--</strong></div>
      </div>
      <div id="metricsSkel" class="skel skel-metrics hidden">
        <div class="skel-m"></div><div class="skel-m"></div><div class="skel-m"></div><div class="skel-m"></div>
      </div>

      <div class="hero-actions">
        <span id="newsCount" class="muted">暂无数据</span>
        <button id="copyBtn" class="btn-text" title="复制报告">
          <svg width="12" height="12" viewBox="0 0 24 24"><path d="M16 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8z" fill="none" stroke="currentColor" stroke-width="2"/><polyline points="16,3 16,8 21,8" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          复制
        </button>
      </div>

      <div class="split">
        <div class="split-col">
          <h3>投资论点</h3>
          <p id="thesis">暂无内容。</p>
          <div id="thesisSkel" class="skel skel-text hidden">
            <div class="skel-line w-100"></div><div class="skel-line w-100"></div><div class="skel-line w-75"></div>
          </div>
        </div>
        <div class="split-col split-risk">
          <h3>风险提示</h3>
          <p id="riskWarning">暂无内容。</p>
          <div id="riskSkel" class="skel skel-text hidden">
            <div class="skel-line w-100"></div><div class="skel-line w-66"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Research & Trade -->
    <div class="grid-2">
      <div class="card">
        <h2>研究结论</h2>
        <dl id="researchList" class="kv"></dl>
      </div>
      <div class="card">
        <h2>交易方案</h2>
        <dl id="tradeList" class="kv"></dl>
      </div>
    </div>

    <!-- Full report -->
    <div class="card">
      <div class="card-head">
        <h2>完整分析过程</h2>
      </div>
      <div id="tabs" class="tabs" role="tablist">
        <button class="active" data-tab="technical">技术</button>
        <button data-tab="sentiment">情绪</button>
        <button data-tab="news">新闻</button>
        <button data-tab="fundamental">基本面</button>
        <button data-tab="risk">风控</button>
        <button data-tab="logs">日志</button>
      </div>
      <pre id="report" class="report">分析结果将显示在这里。</pre>
    </div>

  </section>
</main>

<div id="toast" class="toast hidden"></div>

<script src="./app.js?v=7"></script>
</body>
</html>
